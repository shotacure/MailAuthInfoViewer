<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #ffffff; --bg-alt: #f5f5f5; --bg-item-even: #fafafa;
    --text: #333333; --text-sub: #555555; --text-faint: #999999;
    --border: #dddddd; --border-light: #eeeeee;
    --accent: #2196f3; --accent-hover: #1976d2;
    --danger: #e53935; --danger-bg-hover: #ffebee;
    --input-bg: #ffffff; --input-border: #cccccc;
    --btn-bg: #f0f0f0; --btn-border: #cccccc;
    --success: #4caf50;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #2b2b2b; --bg-alt: #333333; --bg-item-even: #303030;
      --text: #e0e0e0; --text-sub: #bbbbbb; --text-faint: #888888;
      --border: #4a4a4a; --border-light: #3a3a3a;
      --accent: #64b5f6; --accent-hover: #42a5f5;
      --danger: #ef5350; --danger-bg-hover: #4a2020;
      --input-bg: #3a3a3a; --input-border: #555555;
      --btn-bg: #404040; --btn-border: #555555;
      --success: #66bb6a;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 600px; margin: 20px auto; padding: 0 20px;
    color: var(--text); background: var(--bg);
    font-size: 14px; line-height: 1.5;
  }
  h1 {
    font-size: 18px; font-weight: 600;
    border-bottom: 2px solid var(--accent); padding-bottom: 8px;
    margin: 0 0 20px 0;
  }
  h2 { font-size: 14px; font-weight: 600; margin: 24px 0 4px 0; color: var(--text-sub); }
  p.desc { font-size: 12px; color: var(--text-faint); margin: 0 0 16px 0; }

  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input {
    flex: 1; padding: 8px 12px; font-size: 13px;
    border: 1px solid var(--input-border); border-radius: 4px;
    background: var(--input-bg); color: var(--text);
    outline: none;
  }
  .add-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  button {
    padding: 7px 16px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--btn-border); border-radius: 4px;
    background: var(--btn-bg); color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  button:hover { filter: brightness(1.1); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-hover); }
  button.danger {
    color: var(--danger); border-color: var(--danger);
    background: transparent; font-size: 11px; padding: 4px 10px;
  }
  button.danger:hover { background: var(--danger-bg-hover); }

  .domain-list {
    border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; min-height: 48px;
  }
  .domain-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border-light);
    font-size: 13px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  .domain-item:last-child { border-bottom: none; }
  .domain-item:nth-child(even) { background: var(--bg-item-even); }
  .empty {
    padding: 24px; text-align: center;
    color: var(--text-faint); font-size: 13px; font-style: italic;
  }

  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .status { font-size: 12px; color: var(--success); margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>
  <h1 id="title"></h1>
  <h2 id="whitelistTitle"></h2>
  <p class="desc" id="whitelistDesc"></p>

  <div class="add-row">
    <input type="text" id="domainInput" placeholder="example.com">
    <button class="primary" id="addBtn"></button>
  </div>

  <div class="domain-list" id="domainList"></div>

  <div class="actions">
    <button id="exportBtn"></button>
    <button id="importBtn"></button>
    <input type="file" id="importFile" accept=".txt,.text" style="display:none;">
  </div>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
